<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ViMax Lite{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d7dce2;
      --text: #17202a;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-soft: #d9f3ef;
      --warn: #b45309;
      --bad: #b91c1c;
    }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    header { background: #111827; color: white; padding: 14px 24px; display: flex; align-items: center; gap: 18px; }
    header a { color: white; text-decoration: none; font-weight: 600; }
    main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    label { display: block; font-weight: 650; margin: 12px 0 6px; }
    input, textarea, select { width: 100%; box-sizing: border-box; border: 1px solid var(--line); border-radius: 6px; padding: 10px; font: inherit; background: white; }
    textarea { min-height: 120px; resize: vertical; }
    button, .button { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: 0; border-radius: 6px; padding: 10px 14px; background: var(--accent); color: white; text-decoration: none; font-weight: 700; cursor: pointer; }
    .button.secondary { background: #334155; }
    .button.ghost { background: #e2e8f0; color: var(--text); }
    .muted { color: var(--muted); }
    .help { color: var(--muted); font-size: 13px; margin: 6px 0 0; }
    .inline-fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .preset-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .preset-row button { padding: 7px 10px; font-size: 13px; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 12px 0; }
    .image-preview { border: 1px solid var(--line); border-radius: 8px; min-height: 160px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--muted); font-size: 13px; }
    .image-preview img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .draggable-asset { cursor: grab; }
    .draggable-asset:active { cursor: grabbing; }
    .stat { border-left: 4px solid var(--accent); padding-left: 12px; }
    .progress { height: 14px; border-radius: 999px; background: #e5e7eb; overflow: hidden; }
    .progress > div { height: 100%; width: 0%; background: var(--accent); transition: width .25s ease; }
    .badge { display: inline-block; background: var(--accent-soft); color: #134e4a; border-radius: 999px; padding: 4px 10px; font-size: 13px; font-weight: 700; }
    .badge.warn { background: #fef3c7; color: var(--warn); }
    .badge.bad { background: #fee2e2; color: var(--bad); }
    pre, textarea.copybox { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; }
    .shot { margin-bottom: 16px; }
    .refs li { margin: 4px 0; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <a href="/">ViMax Lite</a>
    <a href="/">Projects</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    (() => {
      const fileCache = new Map();

      const filenameFromImage = (image) => {
        if (image.dataset.dragName) return image.dataset.dragName;
        const url = new URL(image.currentSrc || image.src, window.location.href);
        const last = url.pathname.split("/").filter(Boolean).pop() || "vimax-reference.png";
        return decodeURIComponent(last).replace(/[^A-Za-z0-9_.-]/g, "_");
      };

      const cacheImageFile = async (image) => {
        const src = image.currentSrc || image.src;
        if (!src || fileCache.has(src)) return fileCache.get(src);
        try {
          const response = await fetch(src);
          const blob = await response.blob();
          const type = blob.type || "image/png";
          const file = new File([blob], filenameFromImage(image), {type});
          fileCache.set(src, file);
          image.dataset.dragReady = "true";
          return file;
        } catch (_error) {
          return null;
        }
      };

      const makeImageDraggable = (image) => {
        image.setAttribute("draggable", "true");
        image.classList.add("draggable-asset");
        image.title = "ChatGPTへドラッグして添付できます";
        image.addEventListener("pointerenter", () => {
          void cacheImageFile(image);
        });
        image.addEventListener("dragstart", (event) => {
          const transfer = event.dataTransfer;
          if (!transfer) return;
          const src = image.currentSrc || image.src;
          const absoluteUrl = new URL(src, window.location.href).href;
          const file = fileCache.get(src);
          transfer.effectAllowed = "copy";
          transfer.setData("text/uri-list", absoluteUrl);
          transfer.setData("text/plain", absoluteUrl);
          transfer.setData("DownloadURL", `image/png:${filenameFromImage(image)}:${absoluteUrl}`);
          if (file && transfer.items) {
            try {
              transfer.items.add(file);
            } catch (_error) {
              // Some browsers only allow URL data for cross-page drags.
            }
          } else {
            void cacheImageFile(image);
          }
        });
        void cacheImageFile(image);
      };

      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll("img[data-draggable-asset='true']").forEach(makeImageDraggable);
      });
      window.vimaxMakeImageDraggable = makeImageDraggable;
    })();
  </script>
</body>
</html>
